<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Flower</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: monospace;
            gap: 20px;
            padding: 20px;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        label {
            font-weight: bold;
        }
        
        select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            cursor: pointer;
        }
        
        input[type="range"] {
            cursor: pointer;
            width: 150px;
        }
        
        #fontSizeValue {
            min-width: 40px;
            display: inline-block;
        }
        
        button {
            padding: 8px 16px;
            background-color: #333;
            color: white;
            border: none;
            border-radius: 4px;
            font-family: monospace;
            cursor: pointer;
            font-size: 14px;
        }
        
        button:hover {
            background-color: #555;
        }
        
        canvas {
            border: 2px solid #333;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="controls">
        <div class="control-group">
            <label for="fontSizeSlider">Font Size:</label>
            <input type="range" id="fontSizeSlider" min="8" max="48" value="24" step="1">
            <span id="fontSizeValue">24px</span>
        </div>
        <div class="control-group">
            <label for="flowerSelect">Flower:</label>
            <select id="flowerSelect">
                <option value="poinsettia" selected>Poinsettia</option>
                <option value="delicate">Delicate Rose</option>
                <option value="delicate2">Delicate Flower</option>
            </select>
        </div>
        <div class="control-group">
            <label for="styleSelect">Style:</label>
            <select id="styleSelect">
                <option value="classic" selected>Classic</option>
                <option value="dark">Dark Mode</option>
                <option value="neon">Neon</option>
                <option value="vintage">Vintage</option>
                <option value="pastel">Pastel</option>
            </select>
        </div>
        <div class="control-group">
            <button id="downloadBtn">Download SVG</button>
        </div>
    </div>
    
    <canvas id="flowerCanvas" width="1748" height="1240"></canvas>
    
    <script src="flowers.js"></script>
    <script src="styles.js"></script>
    <script src="script.js"></script>
    
    <script>
        function downloadAsSVG() {
            const flower = flowers[currentFlower];
            const style = styles[currentStyle];
            
            if (!flower || !style) {
                alert('Error: Invalid flower or style');
                return;
            }
            
            // Calculate dimensions and positioning
            const canvasWidth = canvas.width;
            const canvasHeight = canvas.height;
            const lineHeight = currentFontSize + 4;
            const totalHeight = flower.lines.length * lineHeight;
            const startY = Math.max(20, (canvasHeight - totalHeight) / 2);
            const startX = 30;
            
            // Create SVG header
            let svgContent = `<?xml version="1.0" encoding="UTF-8"?>
<svg width="${canvasWidth}" height="${canvasHeight}" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .flower-text { font-family: monospace; font-size: ${currentFontSize}px; fill: ${style.textColor}; }
      .flower-line { font-family: monospace; font-size: ${currentFontSize}px; fill: ${style.textColor}; }
    </style>
  </defs>
  <rect width="${canvasWidth}" height="${canvasHeight}" fill="${style.backgroundColor}"/>
`;
            
            // Add each line as a separate text element with proper positioning
            flower.lines.forEach((line, index) => {
                const y = startY + (index * lineHeight);
                const escapedLine = line
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;');
                svgContent += `  <text x="${startX}" y="${y}" class="flower-line">${escapedLine}</text>\n`;
            });
            
            svgContent += `</svg>`;
            
            // Create blob and download
            const blob = new Blob([svgContent], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `ascii-flower-${currentFlower}-${new Date().getTime()}.svg`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
        
        // Event listeners for controls
        document.getElementById('downloadBtn').addEventListener('click', downloadAsSVG);
        
        document.getElementById('fontSizeSlider').addEventListener('input', (e) => {
            currentFontSize = parseInt(e.target.value);
            document.getElementById('fontSizeValue').textContent = currentFontSize + 'px';
            renderFlower();
        });
        
        document.getElementById('flowerSelect').addEventListener('change', (e) => {
            currentFlower = e.target.value;
            renderFlower();
        });
        
        document.getElementById('styleSelect').addEventListener('change', (e) => {
            currentStyle = e.target.value;
            renderFlower();
        });
    </script>
</body>
</html>
