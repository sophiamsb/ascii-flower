<!DOCTYPE html>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f5f5f5;
            font-family: monospace;
            gap: 20px;
            padding: 20px;
        }
        
        .controls {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        .control-group {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        label {
            font-weight: bold;
        }
        
        select {
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-family: monospace;
            cursor: pointer;
        }
        
        input[type="range"] {
            cursor: pointer;
            width: 150px;
        }
        
        #fontSizeValue {
            min-width: 40px;
            display: inline-block;
        }
        
        canvas {
            border: 2px solid #333;
            background-color: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

                <option value="neon">Neon</option>

                <option value="pastel">Pastel</option>
            </select>
        </div>
